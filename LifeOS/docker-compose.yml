version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-db
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lifeos_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  lifeos_pgdata:
